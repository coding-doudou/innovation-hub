name: Deploy to Azure Static Web Apps

# Dormant until you enable it: set repository Variable AZURE_DEPLOY_ENABLED=true
# and add the secret AZURE_STATIC_WEB_APPS_API_TOKEN (from the SWA resource).
# Until then this job is skipped, so it never fails your pipeline.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: "/"
          api_location: "api"
          output_location: "dist"
        env:
          # Proxy mode: the SPA calls the same-origin server proxy, never a key.
          VITE_AI_PROXY_URL: /api/chat
          VITE_AI_MODEL: ${{ vars.VITE_AI_MODEL }}
          # Entra ID + SharePoint (repository Variables; not secrets).
          VITE_AAD_CLIENT_ID: ${{ vars.VITE_AAD_CLIENT_ID }}
          VITE_AAD_TENANT_ID: ${{ vars.VITE_AAD_TENANT_ID }}
          VITE_AAD_REDIRECT_URI: ${{ vars.VITE_AAD_REDIRECT_URI }}
          VITE_SP_HOSTNAME: ${{ vars.VITE_SP_HOSTNAME }}
          VITE_SP_SITE_PATH: ${{ vars.VITE_SP_SITE_PATH }}
          VITE_SP_PROJECTS_LIST: ${{ vars.VITE_SP_PROJECTS_LIST }}
          VITE_SP_DECISIONS_LIST: ${{ vars.VITE_SP_DECISIONS_LIST }}
          VITE_DATA_BACKEND: ${{ vars.VITE_DATA_BACKEND }}
