name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Set these as repository Variables (Settings > Secrets and variables >
          # Actions > Variables). They are not secrets. If left unset, the app
          # builds with the browser localStorage backend.
          VITE_AAD_CLIENT_ID: ${{ vars.VITE_AAD_CLIENT_ID }}
          VITE_AAD_TENANT_ID: ${{ vars.VITE_AAD_TENANT_ID }}
          VITE_AAD_REDIRECT_URI: ${{ vars.VITE_AAD_REDIRECT_URI }}
          VITE_SP_HOSTNAME: ${{ vars.VITE_SP_HOSTNAME }}
          VITE_SP_SITE_PATH: ${{ vars.VITE_SP_SITE_PATH }}
          VITE_SP_PROJECTS_LIST: ${{ vars.VITE_SP_PROJECTS_LIST }}
          VITE_SP_DECISIONS_LIST: ${{ vars.VITE_SP_DECISIONS_LIST }}
          VITE_DATA_BACKEND: ${{ vars.VITE_DATA_BACKEND }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
